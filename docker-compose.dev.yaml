services:
  api:
    build:
      context: .
      target: deps
    ports:
      - "4000:4000"
    command: npm run dev
    env_file:
      - .env
    volumes:
      - .:/usr/src/app 
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
        db:
          condition: service_healthy 
        redis:
          condition: service_healthy
  db:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
      - POSTGRES_DB=my_app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d my_app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    image: redis:7
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  postgres_data: