services:
  api:
    build:
      context: .
      target: runner
      # Añadimos esta sección para asegurar que los args pasen del host al Dockerfile
      args:
        - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
        - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
        - INFISICAL_ENV=${INFISICAL_ENV}
        - INFISICAL_PROJECT_PATH=${INFISICAL_PROJECT_PATH}
        - NODE_ENV=${NODE_ENV:-production}
    ports:
      - '${PORT:-4000}:4000'
    environment:
      - DATABASE_URL
      - JWT_SECRET
      - NEW_RELIC_APP_NAME
      - NEW_RELIC_LICENSE_KEY
      - NEW_RELIC_ENABLED=true
      - NEW_RELIC_NO_CONFIG_FILE=true
      - NEW_RELIC_PRISMA_ENABLED=true
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4321}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - BREVO_ACTIVE=${BREVO_ACTIVE:-false}
      - API_SALES_URL=${API_SALES_URL:-http://localhost:5000}
      # Por ESTO (Nombres estándar):
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      # -----------------------
      - R2_BUCKET=${R2_BUCKET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - R2_BUCKET_NAME_EMAIL=${R2_BUCKET_NAME_EMAIL}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - INFISICAL_ENV=${INFISICAL_ENV}
      - INFISICAL_PROJECT_PATH=${INFISICAL_PROJECT_PATH:-/api}
      - NODE_ENV=${NODE_ENV:-production}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_API_URL=${INFISICAL_API_URL:-https://app.infisical.com}
    restart: always
    networks:
      - coolify

# 2. ESTO DEFINE LA RED (Fuera de services)
networks:
  coolify:
    external: true