version: '3.8'
services:
  mongo-db:
    image: mongo:6.0.6
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: jonico22
    volumes:
      - ./mongo:/data/db
    ports:
      - 27017:27017

  postgres-db:
    image: postgres:15.3
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: POSTGRES_DB
      POSTGRES_PASSWORD: jonico22
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432

  postgres-db-auth:
    image: postgres:15.3
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: POSTGRES_DB
      POSTGRES_PASSWORD: jonico22
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
  
  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis:/redis-data:/data